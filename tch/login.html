<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 | 鈦程商務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-bg { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center px-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight">鈦程商務 <span class="text-blue-600">TCH</span></h1>
            <p class="text-gray-500 mt-2">請登入您的帳戶以管理訂閱</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-2xl border border-gray-100">
            <form action="/api/login" method="POST">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">使用者帳號</label>
                    <input type="text" name="username" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" 
                        placeholder="請輸入帳號或電子郵件">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">登入密碼</label>
                    <input type="password" name="password" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" 
                        placeholder="請輸入密碼">
                </div>
                
                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" class="mr-2 rounded border-gray-300 text-blue-600"> 記住我
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:underline">忘記密碼？</a>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transform active:scale-95 transition">
                    立即登入
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500">
                    尚未擁有帳號？ <a href="#" class="text-blue-600 font-bold hover:underline">聯繫客服創建</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-gray-500 text-sm hover:text-gray-700 italic">← 返回首頁</a>
        </div>
    </div>

</body>
</html>
