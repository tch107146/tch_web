<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 | 鈦程商務 TCH Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div id="addMemberModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <h3 class="text-xl font-bold mb-6">新增成員資料</h3>
            <form id="addMemberForm" class="space-y-4 text-sm">
                <div>
                    <label class="block text-gray-500 mb-1">使用者帳號</label>
                    <input type="text" name="username" required class="w-full p-2 border rounded border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">登入密碼</label>
                    <input type="password" name="password" required class="w-full p-2 border rounded border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">當前方案</label>
                    <input type="text" name="plan_name" placeholder="例如：Netflix 4K 家庭團" class="w-full p-2 border rounded border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">到期日期</label>
                    <input type="date" name="expiry_date" class="w-full p-2 border rounded border-gray-300">
                </div>
                <div class="mt-8 flex space-x-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">確認新增</button>
                    <button type="button" onclick="toggleAddModal()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg font-bold">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div class="flex">
        <aside class="w-64 bg-gray-900 min-h-screen text-white hidden md:block">
            <div class="p-6">
                <h1 class="text-xl font-black tracking-widest text-blue-400">TCH ADMIN</h1>
                <p class="text-xs text-gray-500 mt-1">管理員系統 v1.0</p>
            </div>
            <nav class="mt-6">
                <a href="#" class="flex items-center px-6 py-3 bg-blue-600 text-white border-l-4 border-blue-400">
                    <i class="fa-solid fa-users mr-3"></i> 用戶管理
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-file-invoice mr-3"></i> 帳單審核
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-gear mr-3"></i> 系統設定
                </a>
            </nav>
        </aside>

        <main class="flex-1">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">用戶名單管理</h2>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
                        <i class="fa-solid fa-user-plus mr-1"></i> 新增用戶
                    </button>
                </div>
            </header>

            <div class="p-8 grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-gray-500 font-medium">總用戶數</p>
                    <h4 class="text-2xl font-bold text-gray-800">載入中...</h4>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-gray-500 font-medium">本月預計收入</p>
                    <h4 class="text-2xl font-bold text-green-600">--</h4>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-red-500 font-medium">7天內到期用戶</p>
                    <h4 class="text-2xl font-bold text-red-600">0</h4>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-sm text-blue-500 font-medium">待審核繳費</p>
                    <h4 class="text-2xl font-bold text-blue-600">0</h4>
                </div>
            </div>

            <div class="px-8 pb-12">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                <th class="px-6 py-4 border-b font-semibold">用戶名稱</th>
                                <th class="px-6 py-4 border-b font-semibold">當前方案</th>
                                <th class="px-6 py-4 border-b font-semibold">到期日期</th>
                                <th class="px-6 py-4 border-b font-semibold text-center">剩餘天數</th>
                                <th class="px-6 py-4 border-b font-semibold text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleAddModal() {
            document.getElementById('addMemberModal').classList.toggle('hidden');
        }

        // 核心功能：抓取資料並更新畫面
        async function updateAdminStats() {
    try {
        const response = await fetch('/api/admin/list-users');
        if (!response.ok) throw new Error('連線失敗');
        const users = await response.json();

        // 取得所有統計卡片的 h4 標籤
        const cards = document.querySelectorAll('.p-8 h4');

        // 1. 更新「總用戶數」
        cards[0].innerText = users.length;

        // 2. 計算並更新「本月預計收入」
        // 假設每個用戶資料中都有 next_billing_amount，若無則預設為 150
        const totalIncome = users.reduce((sum, user) => sum + (user.next_billing_amount || 150), 0);
        cards[1].innerText = `NT$ ${totalIncome.toLocaleString()}`;

        // 3. 計算並更新「7天內到期用戶」
        const today = new Date();
        const sevenDaysLater = new Date();
        sevenDaysLater.setDate(today.getDate() + 7);
        
        const expiringSoon = users.filter(u => {
            if (!u.expiry_date) return false;
            const expiry = new Date(u.expiry_date);
            return expiry >= today && expiry <= sevenDaysLater;
        });
        cards[2].innerText = expiringSoon.length;

        // 4. 更新「待審核繳費」 (目前先設為 0，未來可串接付款證明表單)
        cards[3].innerText = "0"; 

        // --- 同時更新下方表格 ---
        const tbody = document.querySelector('tbody');
        if (tbody) {
            tbody.innerHTML = ''; 
            users.forEach(user => {
                const expiryDate = new Date(user.expiry_date);
                const diffTime = expiryDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const statusColor = diffDays <= 7 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600';

                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50/30 transition">
                        <td class="px-6 py-4">
                            <div class="font-bold text-gray-800">${user.username}</div>
                            <div class="text-[10px] text-gray-400">ID: #${user.id}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-600">${user.plan_name || '無方案'}</td>
                        <td class="px-6 py-4 font-mono text-gray-800 font-medium">${user.expiry_date || '未設定'}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="${statusColor} px-2 py-1 rounded-full text-[10px] font-bold">${diffDays > 0 ? diffDays : 0} 天</span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button class="text-blue-500 hover:text-blue-700 font-bold px-2 py-1 border border-blue-100 rounded bg-blue-50">編輯</button>
                            <button class="text-gray-400 hover:text-red-500 font-bold px-2 py-1">重設密碼</button>
                        </td>
                    </tr>
                `;
            });
        }
    } catch (error) {
        console.error('載入失敗:', error);
        // 若失敗，將載入中改為錯誤提示
        document.querySelectorAll('.p-8 h4')[0].innerText = "Error";
    }
}

// 確保頁面載入後執行
window.onload = updateAdminStats;
    </script>
</body>
</html>
